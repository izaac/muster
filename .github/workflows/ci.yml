name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shfmt and bats
        run: |
          set -euo pipefail
          SHFMT_VERSION=v3.10.0
          sudo curl -fsSL -o /usr/local/bin/shfmt \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
          sudo chmod +x /usr/local/bin/shfmt
          sudo apt-get update
          sudo apt-get install -y bats shellcheck

      - name: shellcheck
        run: shellcheck -x -s bash muster lib/*.sh drivers/*.sh docker/*.sh examples/*/*.sh

      - name: shfmt (diff)
        run: shfmt -d -i 2 -ci -bn muster lib drivers docker/*.sh examples/*/*.sh

      - name: bats
        run: bats test/
